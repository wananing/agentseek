site_name: agentseek
site_url: https://ob-labs.github.io/agentseek/
repo_url: https://github.com/ob-labs/agentseek
repo_name: ob-labs/agentseek
site_description: Application development lifecycle toolkit for AI ecosystem apps.
edit_uri: edit/dev/docs/

nav:
  - Home: index.md
  - Get Started:
      - Overview: get-started/index.md
  - Guides:
      - Overview: guides/index.md
      - Create a Project: guides/create-project.md
      - Inspect a Project: guides/inspect-project.md
      - Check a Project: guides/check-project.md
      - Run Local Development: guides/run-local-development.md
      - Run Project Tasks: guides/run-project-tasks.md
  - Reference:
      - Overview: reference/index.md
      - CLI: reference/cli.md
      - Lifecycle Spec: reference/lifecycle-spec.md
      - Templates: reference/templates.md
  - Concepts:
      - Overview: concepts/index.md
      - Lifecycle Toolkit: concepts/lifecycle-toolkit.md

theme:
  name: terminal
  custom_dir: overrides

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_description: 面向 AI 生态应用的开发生命周期工具包。
          nav:
            - 首页: index.md
            - 快速开始:
                - 概览: get-started/index.md
            - 指南:
                - 概览: guides/index.md
                - 创建项目: guides/create-project.md
                - 查看项目: guides/inspect-project.md
                - 检查项目: guides/check-project.md
                - 运行本地开发: guides/run-local-development.md
                - 运行项目任务: guides/run-project-tasks.md
            - 参考:
                - 概览: reference/index.md
                - CLI: reference/cli.md
                - 生命周期规范: reference/lifecycle-spec.md
                - 模板: reference/templates.md
            - 概念:
                - 概览: concepts/index.md
                - 生命周期工具包: concepts/lifecycle-toolkit.md

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
