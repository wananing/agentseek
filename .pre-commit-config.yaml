repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
        exclude: '^templates/(bub/default/\{\{cookiecutter\.project_slug\}\}/pyproject\.toml|bub/contextseek/\{\{cookiecutter\.project_slug\}\}/pyproject\.toml|deepagents/default/\{\{cookiecutter\.project_slug\}\}/pyproject\.toml|langchain/default/\{\{cookiecutter\.project_slug\}\}/pyproject\.toml|langchain/cli-remote/\{\{cookiecutter\.project_slug\}\}/pyproject\.toml)$'
      - id: check-yaml
        exclude: ^templates/
      - id: check-json
        exclude: ^.devcontainer/devcontainer.json
      - id: pretty-format-json
        exclude: ^.devcontainer/devcontainer.json
        args: [--autofix, --no-sort-keys]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Use local ruff (from uv) to avoid fetching from GitHub
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check
        language: system
        types: [python]
        exclude: ^(skills/|templates/)
        args: [--exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
        exclude: ^(skills/|templates/)
