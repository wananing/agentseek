version = 1
template = "bub/contextseek"
name = "{{ cookiecutter.project_name }}"
env_file = ".env"

[tools]
required = ["uv", "node", "npm"]

[paths]
required = ["pyproject.toml", "frontend/package.json", "frontend/node_modules"]

[env.BUB_MODEL]
required = true
default = "{{ cookiecutter.default_model }}"
description = "Model id used by Bub and the ContextSeek LLM bridge."

[env.BUB_API_KEY]
required = true
description = "Generic model provider API key."
aliases = ["BUB_OPENAI_API_KEY"]

[env.BUB_OPENAI_API_BASE]
required = false
description = "Optional OpenAI-compatible API base URL."

[env.BUB_STREAM_OUTPUT]
required = false
default = "true"
description = "Enables token-by-token output in the AG-UI channel manager."

[env.BUB_AG_UI_PORT]
required = false
default = "{{ cookiecutter.gateway_port }}"
description = "Bub AG-UI gateway bind port."

[env.BUB_AG_UI_AGENT_URL]
required = false
default = "http://127.0.0.1:{{ cookiecutter.gateway_port }}/agent"
description = "URL used by the Copilot Runtime HttpAgent."

[env.FRONTEND_PORT]
required = false
default = "{{ cookiecutter.frontend_port }}"
description = "Vite dev server port."

[env.COPILOTKIT_PORT]
required = false
default = "{{ cookiecutter.copilotkit_port }}"
description = "CopilotKit Express runtime port."

[env.CTX_SERVER_PORT]
required = false
default = "{{ cookiecutter.ctx_server_port }}"
description = "ContextSeek HTTP API server port."

[env.AGENTSEEK_CTX_STORAGE_BACKEND]
required = false
default = "{{ cookiecutter.contextseek_storage_backend }}"
description = "ContextSeek storage backend."

[env.AGENTSEEK_CTX_TENANT]
required = false
default = "{{ cookiecutter.contextseek_tenant }}"
description = "ContextSeek tenant identifier."

[services.app]
url = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"

[services.gateway]
url = "http://127.0.0.1:{{ cookiecutter.gateway_port }}/agent"

[services.copilotkit]
url = "http://127.0.0.1:{{ cookiecutter.copilotkit_port }}/api/copilotkit"

[services.ctx]
url = "http://127.0.0.1:{{ cookiecutter.ctx_server_port }}/ctx"

[processes.gateway]
command = ["uv", "run", "bub", "gateway", "--enable-channel", "ag-ui"]

[processes.ctx]
command = ["uv", "run", "ctx-server"]

[processes.frontend]
command = ["npm", "run", "dev"]
cwd = "frontend"

[checks.gateway]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.gateway_port }}/agent/health"
timeout = 2
attempts = 3

[checks.copilotkit]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.copilotkit_port }}/health"
timeout = 2
attempts = 3

[checks.ctx]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.ctx_server_port }}/ctx/health"
timeout = 2
attempts = 3

[checks.frontend]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"
timeout = 2
attempts = 3

[tasks.sync]
description = "Install Python dependencies."
command = ["uv", "sync"]

[tasks.frontend]
description = "Install frontend dependencies."
command = ["npm", "install", "--prefix", "frontend"]

[tasks.seed]
description = "Seed example ContextSeek entries."
command = ["uv", "run", "python", "-c", "from {{ cookiecutter.project_slug }}.seed import maybe_seed; maybe_seed()"]
