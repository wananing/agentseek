name: {{ cookiecutter.project_slug }}

services:
  langchain-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_DEFAULT_INDEX: "${UV_DEFAULT_INDEX:-}"
        UV_INDEX_URL: "${UV_INDEX_URL:-}"
        UV_INSECURE_HOST: "${UV_INSECURE_HOST:-}"
{% if cookiecutter._agentseek_source_path %}
      additional_contexts:
        agentseek_source: "{{ cookiecutter._agentseek_source_path }}"
{% endif %}
    env_file:
      - .env
    depends_on:
      phoenix:
        condition: service_started
    environment:
      BUB_AG_UI_HOST: "0.0.0.0"
      BUB_AG_UI_PORT: "${BUB_AG_UI_PORT:-{{ cookiecutter.gateway_port }}}"
      BUB_LANGCHAIN_SPEC: "${BUB_LANGCHAIN_SPEC:-{{ cookiecutter.project_slug }}.demo_binding:build_spec}"
      AGENTSEEK_OTEL_ENABLED: "${AGENTSEEK_OTEL_ENABLED:-true}"
      AGENTSEEK_OTEL_SERVICE_NAME: "${AGENTSEEK_OTEL_SERVICE_NAME:-{{ cookiecutter.project_slug }}}"
      AGENTSEEK_OTEL_PROJECT_NAME: "${AGENTSEEK_OTEL_PROJECT_NAME:-{{ cookiecutter.project_slug }}}"
      AGENTSEEK_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://phoenix:6006/v1/traces"
    ports:
      - "${BUB_AG_UI_PORT:-{{ cookiecutter.gateway_port }}}:${BUB_AG_UI_PORT:-{{ cookiecutter.gateway_port }}}"

  feishu-gateway:
    profiles:
      - feishu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_FEISHU: "true"
        UV_DEFAULT_INDEX: "${UV_DEFAULT_INDEX:-}"
        UV_INDEX_URL: "${UV_INDEX_URL:-}"
        UV_INSECURE_HOST: "${UV_INSECURE_HOST:-}"
{% if cookiecutter._agentseek_source_path %}
      additional_contexts:
        agentseek_source: "{{ cookiecutter._agentseek_source_path }}"
{% endif %}
    env_file:
      - .env
    command: ["serve-feishu"]
    environment:
      BUB_AG_UI_PORT: "${BUB_AG_UI_PORT:-{{ cookiecutter.gateway_port }}}"
      BUB_LANGCHAIN_SPEC: "${BUB_LANGCHAIN_SPEC:-{{ cookiecutter.project_slug }}.demo_binding:build_spec}"
      AGENTSEEK_OTEL_ENABLED: "${AGENTSEEK_OTEL_ENABLED:-false}"
      AGENTSEEK_OTEL_SERVICE_NAME: "${AGENTSEEK_OTEL_SERVICE_NAME:-{{ cookiecutter.project_slug }}-feishu}"
      AGENTSEEK_OTEL_PROJECT_NAME: "${AGENTSEEK_OTEL_PROJECT_NAME:-{{ cookiecutter.project_slug }}}"
      AGENTSEEK_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://phoenix:6006/v1/traces"
      NO_PROXY: "*"
      no_proxy: "*"

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    env_file:
      - .env
    environment:
      BUB_AG_UI_AGENT_URL: "http://langchain-app:${BUB_AG_UI_PORT:-{{ cookiecutter.gateway_port }}}/agent"
      COPILOTKIT_PORT: "${COPILOTKIT_PORT:-{{ cookiecutter.copilotkit_port }}}"
      FRONTEND_PORT: "${FRONTEND_PORT:-{{ cookiecutter.frontend_port }}}"
      VITE_COPILOTKIT_RUNTIME_PROXY: "http://127.0.0.1:${COPILOTKIT_PORT:-{{ cookiecutter.copilotkit_port }}}"
      VITE_BUB_AG_UI_URL: "http://langchain-app:${BUB_AG_UI_PORT:-{{ cookiecutter.gateway_port }}}"
    command:
      - sh
      - -lc
      - |
        npm install --no-package-lock
        npx tsx server.ts &
        npx vite --host 0.0.0.0
    depends_on:
      langchain-app:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-{{ cookiecutter.frontend_port }}}:${FRONTEND_PORT:-{{ cookiecutter.frontend_port }}}"
      - "${COPILOTKIT_PORT:-{{ cookiecutter.copilotkit_port }}}:${COPILOTKIT_PORT:-{{ cookiecutter.copilotkit_port }}}"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules

  phoenix:
    image: ghcr.io/psiace/phoenix:mysql
    depends_on:
      seekdb:
        condition: service_healthy
    ports:
      - "6006:6006"
    expose:
      - "4317"
    environment:
      PHOENIX_SQL_DATABASE_URL: mysql://root@seekdb:2881/phoenix
      PHOENIX_ALLOW_EXTERNAL_RESOURCES: "false"
      PHOENIX_WORKING_DIR: /phoenix-data
    user: root
    volumes:
      - ./.phoenix-data:/phoenix-data

  seekdb:
    image: quay.io/oceanbase/seekdb:latest
    restart: unless-stopped
    environment:
      DATAFILE_SIZE: 2G
      DATAFILE_NEXT: 2G
      DATAFILE_MAXSIZE: 50G
      LOG_DISK_SIZE: 2G
      SEEKDB_DATABASE: phoenix
    ports:
      - "127.0.0.1:2884:2881"
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P2881 -uroot -e 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    volumes:
      - ./.seekdb-data:/var/lib/oceanbase

volumes:
  frontend_node_modules:
    driver: local
