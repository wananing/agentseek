version = 1
template = "langchain/agentic-rag"
name = "{{ cookiecutter.project_name }}"
env_file = ".env"

[tools]
required = ["uv", "node", "npm", "docker"]

[paths]
required = [
  "pyproject.toml",
  "langgraph.json",
  "docker-compose.yml",
  "frontend/package.json",
  "frontend/node_modules",
]

[env.AGENTSEEK_MODEL_PROVIDER]
required = true
default = "{{ cookiecutter.default_model_provider }}"
description = "LangChain model provider: openai, anthropic, or google_genai."

[env.AGENTSEEK_MODEL]
required = true
default = "{{ cookiecutter.default_model }}"
description = "Model id passed to LangChain chat model initialization."
aliases = ["BUB_MODEL"]

[env.SEEKDB_HOST]
required = true
default = "127.0.0.1"
description = "SeekDB host used by the vector store."

[env.SEEKDB_PORT]
required = true
default = "2881"
description = "SeekDB MySQL-compatible port."

[env.SEEKDB_USER]
required = true
default = "root"
description = "SeekDB user."

[env.SEEKDB_DB_NAME]
required = true
default = "{{ cookiecutter.seekdb_db_name }}"
description = "SeekDB database name."

[env.VECTOR_TABLE_NAME]
required = true
default = "{{ cookiecutter.vector_table_name }}"
description = "Vector table used for ingested documents."

[services.backend]
url = "http://127.0.0.1:2024"

[services.frontend]
url = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"

[processes.seekdb]
command = ["docker", "compose", "up", "seekdb"]

[processes.backend]
command = ["sh", "-lc", "i=0; until docker compose exec -T seekdb mysql -h127.0.0.1 -P2881 -uroot -e 'SELECT 1'; do i=$((i + 1)); if [ \"$i\" -ge 60 ]; then exit 1; fi; sleep 2; done && uv run langgraph dev --no-browser"]

[processes.frontend]
command = ["npm", "run", "dev"]
cwd = "frontend"

[checks.backend]
type = "http"
target = "http://127.0.0.1:2024"
timeout = 2
attempts = 3

[checks.frontend]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"
timeout = 2
attempts = 3

[tasks.sync]
description = "Install Python dependencies."
command = ["uv", "sync"]

[tasks.frontend]
description = "Install frontend dependencies."
command = ["npm", "install", "--prefix", "frontend"]

[tasks.seekdb]
description = "Start the bundled SeekDB container."
command = ["docker", "compose", "up", "-d"]
