version = 1
template = "langchain/agentic-rag-openvino"
name = "{{ cookiecutter.project_name }}"
env_file = ".env"

[tools]
required = ["uv", "node", "npm", "docker"]

[paths]
required = [
  "pyproject.toml",
  "langgraph.json",
  "docker-compose.yml",
  "frontend/package.json",
  "frontend/node_modules",
]

[env.LLM_MODEL_PATH]
required = true
default = "{{ cookiecutter.llm_model_path }}"
description = "Local OpenVINO IR directory for the LLM. Create it with `agentseek task models`."

[env.EMBEDDING_MODEL_PATH]
required = true
default = "{{ cookiecutter.embedding_model_path }}"
description = "Local OpenVINO IR directory for embeddings. Create it with `agentseek task models`."

[env.OPENVINO_DEVICE]
required = true
default = "{{ cookiecutter.device }}"
description = "OpenVINO inference device: CPU, GPU, or NPU."

[env.MAX_NEW_TOKENS]
required = true
default = "512"
description = "Maximum tokens generated by the local LLM."

[env.SEEKDB_HOST]
required = true
default = "127.0.0.1"
description = "SeekDB host used by the vector store."

[env.SEEKDB_PORT]
required = true
default = "2881"
description = "SeekDB SQL port used by the vector store."

[env.SEEKDB_USER]
required = true
default = "root"
description = "SeekDB user used by the vector store."

[env.SEEKDB_DB_NAME]
required = true
default = "{{ cookiecutter.seekdb_db_name }}"
description = "SeekDB database for indexed documents."

[env.VECTOR_TABLE_NAME]
required = true
default = "{{ cookiecutter.vector_table_name }}"
description = "SeekDB vector table for indexed document chunks."

[env.LANGSMITH_TRACING]
required = false
default = "false"
description = "Set to true to enable LangSmith tracing."

[env.LANGSMITH_PROJECT]
required = false
default = "{{ cookiecutter.project_slug }}"
description = "LangSmith project name when tracing is enabled."

[services.seekdb]
url = "mysql://127.0.0.1:2881/{{ cookiecutter.seekdb_db_name }}"

[services.backend]
url = "http://127.0.0.1:{{ cookiecutter.langgraph_port }}"

[services.frontend]
url = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"

[processes.seekdb]
command = ["docker", "compose", "up", "seekdb"]

[processes.backend]
command = ["sh", "-lc", "i=0; until docker compose exec -T seekdb mysql -h127.0.0.1 -P2881 -uroot -e 'SELECT 1'; do i=$((i + 1)); if [ \"$i\" -ge 60 ]; then exit 1; fi; sleep 2; done && uv run langgraph dev --no-browser --port {{ cookiecutter.langgraph_port }}"]

[processes.frontend]
command = ["npm", "run", "dev", "--", "--host", "127.0.0.1"]
cwd = "frontend"

[checks.backend]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.langgraph_port }}"
timeout = 2
attempts = 3

[checks.frontend]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"
timeout = 2
attempts = 3

[tasks.sync]
description = "Install Python dependencies."
command = ["uv", "sync"]

[tasks.frontend]
description = "Install frontend dependencies."
command = ["npm", "install", "--prefix", "frontend"]

[tasks.models]
description = "Download HuggingFace models and convert them to OpenVINO IR."
command = ["uv", "run", "convert-models"]

[tasks.seekdb]
description = "Start SeekDB in the background."
command = ["docker", "compose", "up", "-d", "seekdb"]

[tasks.ingest-sample]
description = "Ingest the default sample article after models and SeekDB are ready."
command = ["uv", "run", "ingest", "https://lilianweng.github.io/posts/2023-06-23-agent/"]
